{{HTTP_REDIRECT}}
server {
    {{LISTEN_DIRECTIVE}}
    server_name {{SERVER_NAME}};

    location = /api {
        proxy_pass http://{{PROJECT_NAME}}-ambrosia-1:9154/;
        include /etc/nginx/conf.d/snippets/proxy-headers.conf;
    }

    location = /api/ws-payments {
        proxy_pass http://{{PROJECT_NAME}}-ambrosia-client-1:3000/api/ws-payments;
        include /etc/nginx/conf.d/snippets/proxy-headers.conf;
        include /etc/nginx/conf.d/snippets/websocket.conf;
    }

    location ^~ /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://{{PROJECT_NAME}}-ambrosia-1:9154;
        include /etc/nginx/conf.d/snippets/proxy-headers.conf;
    }

    location ^~ /uploads/ {
        proxy_pass http://{{PROJECT_NAME}}-ambrosia-1:9154;
        include /etc/nginx/conf.d/snippets/proxy-headers.conf;
    }

    location / {
        proxy_pass http://{{PROJECT_NAME}}-ambrosia-client-1:3000;
        include /etc/nginx/conf.d/snippets/proxy-headers.conf;
    }
}
