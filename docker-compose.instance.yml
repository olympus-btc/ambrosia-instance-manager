services:
  phoenixd:
    image: ${PHOENIXD_IMAGE}
    entrypoint:
      - "sh"
      - "-lc"
    command:
      - >
        exec /phoenix/phoenixd
        --agree-to-terms-of-service
        --http-bind-ip 0.0.0.0
        --chain="${PHOENIX_CHAIN}"
        ${PHOENIX_AUTO_LIQUIDITY:+--auto-liquidity=${PHOENIX_AUTO_LIQUIDITY}}
        ${PHOENIX_MAX_MINING_FEE:+--max-mining-fee=${PHOENIX_MAX_MINING_FEE}}
    restart: unless-stopped
    networks:
      - default
    ports:
      - "${PHOENIX_PORT}:9740"
    volumes:
      - phoenix_data:/phoenix/.phoenix

  ambrosia:
    build:
      context: ${AMBROSIA_SERVER_CONTEXT}
    image: ambrosia
    restart: unless-stopped
    networks:
      - default
    ports:
      - "${API_PORT}:9154"
    volumes:
      - ambrosia_data:/root/.Ambrosia-POS
      - phoenix_data:/root/.phoenix
    depends_on:
      - phoenixd

  ambrosia-client:
    build:
      context: ${AMBROSIA_CLIENT_CONTEXT}
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    image: ambrosia-client
    restart: unless-stopped
    networks:
      - default
    volumes:
      - ambrosia_data:/root/.Ambrosia-POS
    depends_on:
      - ambrosia
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      INTERNAL_ORIGIN: ${INTERNAL_ORIGIN}

  gateway:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${CLIENT_PORT}:80"
    command: >
      sh -c "echo 'server {
        listen 80;
        location /api/ {
          proxy_pass http://ambrosia:9154/;
          proxy_http_version 1.1;
          proxy_set_header Upgrade \$$http_upgrade;
          proxy_set_header Connection \"upgrade\";
          proxy_set_header Host \$$host;
          proxy_set_header X-Real-IP \$$remote_addr;
          proxy_set_header X-Forwarded-For \$$proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto \$$scheme;
        }
        location / {
          proxy_pass http://ambrosia-client:3000;
          proxy_http_version 1.1;
          proxy_set_header Upgrade \$$http_upgrade;
          proxy_set_header Connection \"upgrade\";
          proxy_set_header Host \$$host;
          proxy_set_header X-Real-IP \$$remote_addr;
          proxy_set_header X-Forwarded-For \$$proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto \$$scheme;
        }
      }' > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    depends_on:
      - ambrosia-client
      - ambrosia

volumes:
  phoenix_data:
    name: ${PHOENIX_VOLUME}
  ambrosia_data:
    name: ${AMBROSIA_VOLUME}
