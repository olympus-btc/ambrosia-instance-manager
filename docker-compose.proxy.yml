services:
  nginx:
    image: nginx:alpine
    container_name: ambrosia-proxy
    restart: unless-stopped
    ports:
      - "${PROXY_HTTP_BIND:-80}:80"
      - "${PROXY_HTTPS_BIND:-443}:443"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./proxy/conf.d:/etc/nginx/conf.d:ro
      - proxy_certs:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    networks:
      - ambrosia-proxy

  certbot:
    image: certbot/certbot
    container_name: ambrosia-certbot
    volumes:
      - proxy_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

networks:
  ambrosia-proxy:
    name: ambrosia-proxy
    driver: bridge

volumes:
  proxy_certs:
    name: ambrosia-proxy-certs
  certbot_webroot:
    name: ambrosia-certbot-webroot
